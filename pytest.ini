[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
asyncio_mode = auto

# Filtrujemy znane warningi z bibliotek zewnętrznych - nie z naszego kodu.
filterwarnings =
    ignore::DeprecationWarning:bs4.*
    ignore::FutureWarning:ebooklib.*
    ignore::UserWarning:ebooklib.*
    ignore::bs4.XMLParsedAsHTMLWarning
