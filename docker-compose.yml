version: '3.8'

services:
  redis:
    image: redis:7.4-alpine
    container_name: epub_narrate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    container_name: epub_narrate_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: epub_narrate_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy

  ui:
    build: .
    container_name: epub_narrate_ui
    command: python frontend/app.py
    ports:
      - "7860:7860"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  redis_data: